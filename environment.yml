# Reproducible environment for interpretable-vol-surface-hedger.
#   conda env create -f environment.yml && conda activate ivsh
# (mirrors the CI install; Python 3.11 is the tested version)
name: ivsh
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - -e .[dev]   # numpy, pandas, scipy, matplotlib, pyarrow + pytest/ruff/black
      # Optional, only to RUN (not skip) the deep-RL baseline test:
      # - torch
      # - gymnasium

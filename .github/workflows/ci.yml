name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        # The deep-RL baseline test self-skips when torch/gymnasium are absent
        # (pytest.importorskip); the prototype hedger and SVI core are fully covered.
        run: pytest tests/ -q
